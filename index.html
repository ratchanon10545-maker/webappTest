<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>ระบบตรวจคำตอบหลายชุด</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f6f9;
    }

    .question {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .correct {
      color: green;
      font-weight: bold;
    }

    .wrong {
      color: red;
      font-weight: bold;
    }

    button {
      padding: 8px 15px;
      margin-top: 10px;
      cursor: pointer;
    }

    select {
      padding: 6px;
    }
  </style>
</head>

<body>

  <h2>เลือกชุดข้อสอบ</h2>

  <select id="examSelect">
    <option value="">-- เลือกข้อสอบ --</option>
    <option value="set1">ชุดที่ 1 พรป.ว่าด้วยคณะกกต</option>
    <option value="set2">ชุดที่ 2 พรป.ว่าด้วยพรรคการเมือง พ.ศ.2560</option>
    <option value="set3">ชุดที่ 3 พรป.ว่าด้วยการเลือกตั้งสมาชิกสภาผู้แทนราษฎร พ.ศ. 2561</option>
  </select>

  <button onclick="loadExam()">เริ่มทำข้อสอบ</button>

  <hr>

  <div id="quiz"></div>
  <button onclick="checkAnswers()" id="checkBtn" style="display:none;">ตรวจคำตอบ</button>
  <h3 id="result"></h3>

  <script>

    let answerKey = {};
    let score = 0;
    let answered = {};

    async function loadExam() {
      const exam = document.getElementById("examSelect").value;
      if (!exam) return alert("กรุณาเลือกชุดข้อสอบ");

      document.getElementById("quiz").innerHTML = "";
      document.getElementById("result").innerHTML = "";
      score = 0;
      answered = {};

      const qRes = await fetch(`data/${exam}.txt`);
      const text = await qRes.text();

      const aRes = await fetch(`data/${exam}_answers.json`);
      answerKey = await aRes.json();

      const quizDiv = document.getElementById("quiz");
      const questionBlocks = text.split(/\n(?=\d+\.)/);

      questionBlocks.forEach(block => {
        const lines = block.trim().split("\n");
        if (!lines[0]) return;

        const questionText = lines[0];
        const qNumber = questionText.match(/^(\d+)/)[1];

        const div = document.createElement("div");
        div.className = "question";

        let html = `<p>${questionText}</p>`;

        for (let i = 1; i < lines.length; i++) {
          const option = lines[i].trim();
          if (!option) continue;

          const letter = option.charAt(0);

          html += `
        <label>
          <input type="radio" 
                 name="q${qNumber}" 
                 value="${letter}"
                 onclick="checkSingleAnswer(${qNumber})">
          ${option}
        </label><br/>
      `;
        }

        html += `<div id="feedback${qNumber}"></div>`;
        div.innerHTML = html;
        quizDiv.appendChild(div);
      });
    }

    function checkSingleAnswer(qNumber) {
      const selected = document.querySelector(`input[name="q${qNumber}"]:checked`);
      const feedback = document.getElementById(`feedback${qNumber}`);

      if (!selected) return;

      const correct = answerKey[qNumber];

      // กันการกดซ้ำเพิ่มคะแนน
      if (!answered[qNumber]) {
        answered[qNumber] = true;

        if (selected.value === correct) {
          score++;
        }
      }

      if (selected.value === correct) {
        feedback.innerHTML = `<span style="color:green;font-weight:bold;">✔ ถูกต้อง</span>`;
      } else {
        feedback.innerHTML =
          `<span style="color:red;font-weight:bold;">
        ✘ ผิด (คำตอบที่ถูกคือ ${correct})
       </span>`;
      }

      document.getElementById("result").innerText =
        `คะแนนปัจจุบัน: ${score} / ${Object.keys(answerKey).length}`;
    }

  </script>

</body>

</html>
